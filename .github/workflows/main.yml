# nome do workflow
name: Pipeline CI/CD
# Definir quando o pipeline será disparado
on:
  push:
    branches: 
      - main
    paths: # Dispara ao mudar arquivos nesses caminhos
      - "src/**" # só mudanças no cógigo fonte
      - ".github/workflows/**" # Mudanças no próprio pipeline
  workflow_dispatch: # Habilita o btn "Run worflow" no github action
jobs:
# Primeiro Job: build
  build:
    runs-on: ubuntu-latest # Imagem da máquina usada no CI
    # Passo a passo
    steps:
      - name: Checkout  do código
        uses: actions/checkout@v5

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalação das Dependências
        run: npm install
      - name: Rodar build
        run: npm run build
        env:
          NEWS_API_KEY: ${{secrets.NEWS_API_KEY}}
          NEWS_API_URL: ${{vars.NEWS_API_URL}}

  tests:
    runs-on: ubuntu-latest # Imagem da máquina usada no CI
    needs: build # depende do processo build

    steps:
      - name: Checkout  do código
        uses: actions/checkout@v5

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalação das Dependências
        run: npm install
      - name: Rodar lint
        run: npm run lint
      - name: Checkar formatação
        run: npm run format
      - name: Rodar testes
        run: npm run test
    
    

